name: Live Kapso Tests

on:
  workflow_dispatch:
    inputs:
      profile:
        description: Live test profile
        required: true
        default: all
        type: choice
        options:
          - all
          - sandbox
          - production-readonly
  schedule:
    - cron: '0 9 * * *'

concurrency:
  group: live-kapso-tests
  cancel-in-progress: true

jobs:
  live:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify sandbox secrets
        if: ${{ github.event_name == 'schedule' || inputs.profile == 'all' || inputs.profile == 'sandbox' }}
        env:
          KAPSO_API_KEY: ${{ secrets.KAPSO_API_KEY }}
          KAPSO_SANDBOX_PHONE_NUMBER_ID: ${{ secrets.KAPSO_SANDBOX_PHONE_NUMBER_ID }}
          KAPSO_TEST_RECIPIENT: ${{ secrets.KAPSO_TEST_RECIPIENT }}
        run: |
          test -n "$KAPSO_API_KEY" || (echo "Missing repository secret: KAPSO_API_KEY" && exit 1)
          test -n "$KAPSO_SANDBOX_PHONE_NUMBER_ID" || (echo "Missing repository secret: KAPSO_SANDBOX_PHONE_NUMBER_ID" && exit 1)
          test -n "$KAPSO_TEST_RECIPIENT" || (echo "Missing repository secret: KAPSO_TEST_RECIPIENT" && exit 1)

      - name: Verify production secrets
        if: ${{ github.event_name == 'schedule' || inputs.profile == 'all' || inputs.profile == 'production-readonly' }}
        env:
          KAPSO_API_KEY: ${{ secrets.KAPSO_API_KEY }}
          KAPSO_PRODUCTION_PHONE_NUMBER_ID: ${{ secrets.KAPSO_PRODUCTION_PHONE_NUMBER_ID }}
        run: |
          test -n "$KAPSO_API_KEY" || (echo "Missing repository secret: KAPSO_API_KEY" && exit 1)
          test -n "$KAPSO_PRODUCTION_PHONE_NUMBER_ID" || (echo "Missing repository secret: KAPSO_PRODUCTION_PHONE_NUMBER_ID" && exit 1)

      - name: Enable Corepack
        run: corepack enable

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22.16.0'
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Run sandbox live tests
        if: ${{ github.event_name == 'schedule' || inputs.profile == 'all' || inputs.profile == 'sandbox' }}
        env:
          RUN_KAPSO_LIVE_TESTS: '1'
          RUN_KAPSO_LIVE_MODE: sandbox
          RUN_KAPSO_LIVE_SEND_MESSAGE: '1'
          KAPSO_API_KEY: ${{ secrets.KAPSO_API_KEY }}
          KAPSO_SANDBOX_PHONE_NUMBER_ID: ${{ secrets.KAPSO_SANDBOX_PHONE_NUMBER_ID }}
          KAPSO_TEST_RECIPIENT: ${{ secrets.KAPSO_TEST_RECIPIENT }}
        run: pnpm test:live:sandbox

      - name: Run production read-only live tests
        if: ${{ github.event_name == 'schedule' || inputs.profile == 'all' || inputs.profile == 'production-readonly' }}
        env:
          RUN_KAPSO_LIVE_TESTS: '1'
          RUN_KAPSO_LIVE_MODE: production-readonly
          KAPSO_API_KEY: ${{ secrets.KAPSO_API_KEY }}
          KAPSO_PRODUCTION_PHONE_NUMBER_ID: ${{ secrets.KAPSO_PRODUCTION_PHONE_NUMBER_ID }}
        run: pnpm test:live:production-readonly

      - name: Run shared read-only live tests
        if: ${{ github.event_name == 'schedule' || inputs.profile == 'all' }}
        env:
          RUN_KAPSO_LIVE_TESTS: '1'
          RUN_KAPSO_LIVE_MODE: all
          KAPSO_API_KEY: ${{ secrets.KAPSO_API_KEY }}
          KAPSO_SANDBOX_PHONE_NUMBER_ID: ${{ secrets.KAPSO_SANDBOX_PHONE_NUMBER_ID }}
          KAPSO_PRODUCTION_PHONE_NUMBER_ID: ${{ secrets.KAPSO_PRODUCTION_PHONE_NUMBER_ID }}
          KAPSO_TEST_RECIPIENT: ${{ secrets.KAPSO_TEST_RECIPIENT }}
        run: pnpm test:live:shared
